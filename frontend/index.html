<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileDrop Advanced | Peer-to-Peer Transfer</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <!-- CSS Link -->
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Animated Background for Glassmorphism -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <header class="glass-header">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </div>
      <span class="app-title">FileDrop <span class="badge">Pro</span></span>
    </div>

    <div class="header-controls">
      <!-- Theme Toggle -->
      <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>

      <!-- Connection ID -->
      <div class="id-badge glass-panel">
        <span class="label">Your ID:</span>
        <code id="my-peer-id" class="selectable-id">Connecting...</code>
      </div>
    </div>
  </header>

  <main class="drag-drop-zone" id="main-zone">
    <!-- Overlay for Drag & Drop -->
    <div class="drag-overlay hidden" id="drag-overlay">
      <div class="drag-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <h2>Drop files here to send</h2>
      </div>
    </div>

    <div class="radar-area">
      <!-- 3D Radar Rings -->
      <div class="radar-rings">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
      </div>
      <div class="radar-pulse"></div>

      <!-- You node always in center -->
      <div class="node you" id="you-node">
        <div class="avatar you-avatar ripple-effect">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <span class="node-label">You</span>
      </div>

      <!-- Peers get injected here by JS -->
      <div id="peers-container"></div>
    </div>

    <!-- Status messages -->
    <div class="status-container glass-panel">
      <div class="status-indicator active"></div>
      <div id="status-msg" class="status-text">
        Waiting for peers on your network...
      </div>
    </div>
  </main>

  <!-- Developer Footer -->
  <footer class="dev-footer glass-panel">
    <div class="dev-info">
      <img src="shohag.jpg" alt="Developer" class="dev-avatar" id="dev-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjODg4IiBzdHJva2Utd2lkdGg9IjIiPjxjaXJjbGUgY3g9IjEyIiBjeT0iOCIgcj0iNCIvPjxwYXRoIGQ9Ik00IDIwYzAtNCAzLjYtNyA4LTdzOCAzIDggNyIvPjwvc3ZnPg=='" />
      <div class="dev-text">
        <span class="dev-label">Developed with ❤️ by</span>
        <strong class="dev-name">Md Shohag Islam</strong>
      </div>
    </div>
  </footer>

  <!-- Send File/Text Modal (Glassmorphism) -->
  <div id="send-modal" class="modal hidden">
    <div class="modal-box glass-panel">
      <button class="close-btn" id="close-modal-btn">&times;</button>
      
      <div class="modal-header">
        <div class="peer-avatar-small" id="modal-peer-avatar"></div>
        <div>
          <h3 class="modal-peer-name" id="modal-peer-name">Peer</h3>
          <p class="modal-hint">Select items to send</p>
        </div>
      </div>

      <!-- Tabs for File or Text -->
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="file">Files</button>
        <button class="tab-btn" data-tab="text">Text / Link</button>
      </div>

      <!-- File Pick Area -->
      <div class="tab-content active" id="tab-file">
        <label class="file-pick-area" id="file-pick-label">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
          <span id="file-name-display">Click to select or drag files here</span>
          <!-- Added multiple attribute for multiple file support -->
          <input type="file" id="file-input" style="display:none" multiple />
        </label>
      </div>

      <!-- Text Pick Area (New Feature) -->
      <div class="tab-content hidden" id="tab-text">
        <textarea id="text-input" class="glass-input" placeholder="Type a message or paste a link here..."></textarea>
      </div>

      <div class="modal-actions">
        <button id="send-btn" class="btn-primary glow-btn" disabled>
          <span>Send</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>

      <!-- Progress Area -->
      <div id="progress-wrap" class="progress-wrap hidden">
        <div class="progress-info">
          <span id="progress-filename" class="truncate">Sending...</span>
          <span id="progress-label" class="mono">0%</span>
        </div>
        <div class="progress-bar-track glass-track">
          <div class="progress-bar-fill gradient-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Receive Toast -->
  <div id="receive-toast" class="receive-toast hidden glass-panel">
    <div class="toast-indicator pulse"></div>
    <div class="toast-content">
      <div class="toast-title" id="toast-title">Incoming Transfer</div>
      <div class="toast-file mono" id="toast-file">file.zip</div>
    </div>
    <div class="toast-actions-vertical">
      <button id="accept-btn" class="btn-icon success" title="Accept">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
      <button id="decline-btn" class="btn-icon danger" title="Decline">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
